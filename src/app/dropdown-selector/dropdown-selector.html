<div class="wrapper" (focusout)="onBlur()">
	@if (isDisplayNameVisible()) {
		<label class="group-label">{{ (displayName() || name()) | titlecase }}</label>
	}
	<p-select
			[invalid]="!!error()"
			[ngModel]="value()"
			[options]="options()"
			[placeholder]="hint() || 'Please select an option'"
			(ngModelChange)="onValueChanged($event)"
			appendTo="body"
			styleClass="full-width-select"
	/>
	@if (error()) {
		<small class="error-message">{{ error() }}</small>
	}
</div>
