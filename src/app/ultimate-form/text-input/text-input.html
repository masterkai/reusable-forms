<label [style]="{ width:columnWidth }">{{ isDisplayNameVisible() ? ((displayName() || name()) | titlecase) : null }}
    <input
            pInputText
            (blur)="blurred()"
            (input)="valueChanged($event)"
            [class]="error() ? 'input-error' : ''"
            [name]="name()"
            [placeholder]="hint()"
            [value]="value()"
            type="text"
    />
    @if (error()) {
        <small class="error-message">{{ error() }}</small>
    }
</label>
